{% extends 'base.html' %}
{% block title %}Profile — CollabSpace{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-box" style="max-width:580px">
    <div class="auth-header">
      <div class="auth-tag">Your account</div>
      <div class="auth-title">Edit <em>profile.</em></div>
    </div>
    <form method="post" enctype="multipart/form-data">
      {% csrf_token %}
      <div class="form-row">
        <div class="form-group">
          <label>First name</label>
          <input type="text" name="first_name" value="{{ user.first_name }}">
        </div>
        <div class="form-group">
          <label>Last name</label>
          <input type="text" name="last_name" value="{{ user.last_name }}">
        </div>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" value="{{ user.email }}">
      </div>
      <div class="form-group">
        <label>Phone number</label>
        <input type="text" name="phone_number" value="{{ user.profile.phone_number }}">
      </div>
      <div class="form-group">
        <label>Bio</label>
        <textarea name="bio" rows="4">{{ user.profile.bio }}</textarea>
      </div>
      <div class="form-group">
        <label>Profile picture</label>
        <input type="file" name="profile_picture" accept="image/*">
      </div>
      <div class="form-group">
        <label>Resume (PDF)</label>
        <input type="file" name="resume" accept=".pdf">
      </div>
      {% if form.errors %}
        <div style="color:var(--red);font-size:13px;margin-bottom:12px">{{ form.errors }}</div>
      {% endif %}
      <button class="btn btn-primary" style="width:100%" type="submit">Save changes →</button>
    </form>
  </div>
</div>
{% endblock %}
