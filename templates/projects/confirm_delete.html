{% extends 'base.html' %}
{% block title %}Delete Project — CollabSpace{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-box">
    <div class="auth-title" style="margin-bottom:8px">Delete project?</div>
    <p style="color:var(--text2);font-size:14px;margin-bottom:24px">
      Are you sure you want to delete <strong>{{ project.title }}</strong>? This cannot be undone.
    </p>
    <form method="post">
      {% csrf_token %}
      <div style="display:flex;gap:12px">
        <a class="btn btn-outline" style="flex:1;text-align:center" href="{% url 'project_detail' project.pk %}">Cancel</a>
        <button class="btn btn-danger" style="flex:1" type="submit">Yes, delete</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
